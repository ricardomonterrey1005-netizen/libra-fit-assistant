<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Libra Fit - Admin</title>
<style>
  :root{
    --bg:#000;--card:#0f0f0f;--card2:#161616;--border:#1c1c1c;
    --accent:#ff5722;--accent2:#ff7043;
    --t1:#fff;--t2:#a0a0a0;--t3:#5a5a5a;
    --green:#4caf50;--red:#f44336;--yellow:#ffb300;--blue:#2196f3;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--t1);font-family:-apple-system,Segoe UI,Inter,sans-serif;padding:20px;min-height:100vh}
  h1{font-size:24px;margin-bottom:4px}
  .sub{color:var(--t2);font-size:13px;margin-bottom:20px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px}
  .auth-box{max-width:400px;margin:80px auto}
  input,select,button{font-family:inherit;font-size:14px}
  input,select{width:100%;padding:12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;color:var(--t1);margin-bottom:10px}
  button{padding:12px 20px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;min-height:44px}
  button:hover{background:var(--accent2)}
  button.outline{background:transparent;border:1px solid var(--border);color:var(--t1)}
  button.danger{background:var(--red)}
  .err{color:var(--red);font-size:13px;margin:6px 0;min-height:18px}
  .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:16px}
  .stat{background:var(--card2);padding:12px;border-radius:10px;text-align:center}
  .stat-v{font-size:24px;font-weight:800;color:var(--accent)}
  .stat-l{font-size:11px;color:var(--t2);text-transform:uppercase;letter-spacing:.5px}
  table{width:100%;border-collapse:collapse;font-size:12px}
  th,td{padding:8px 6px;text-align:left;border-bottom:1px solid var(--border)}
  th{color:var(--t2);font-weight:600;font-size:11px;text-transform:uppercase}
  td{color:var(--t1)}
  .tag{display:inline-block;padding:2px 8px;border-radius:12px;font-size:10px;font-weight:700}
  .tag.ok{background:rgba(76,175,80,0.15);color:var(--green)}
  .tag.bad{background:rgba(244,67,54,0.15);color:var(--red)}
  .tag.warn{background:rgba(255,179,0,0.15);color:var(--yellow)}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:10px}
  .row>*{flex:none}
  .row select,.row input{flex:1;margin:0;min-width:150px}
  .scroll{max-height:400px;overflow-y:auto}
  .sec-t{font-size:14px;font-weight:700;margin-bottom:10px;color:var(--accent);text-transform:uppercase;letter-spacing:.5px}
  .hide{display:none}
  a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>

<div id="login" class="auth-box">
  <div class="card">
    <h1>⚖️ Libra Admin</h1>
    <div class="sub">Panel de monitoreo y backup</div>
    <label style="font-size:12px;color:var(--t2)">Contrasena admin</label>
    <input type="password" id="pw" placeholder="••••••" autofocus>
    <div class="err" id="err"></div>
    <button id="loginBtn" style="width:100%">Entrar</button>
    <div style="margin-top:14px;font-size:11px;color:var(--t3);text-align:center">
      <a href="/">Volver a la app</a>
    </div>
  </div>
</div>

<div id="panel" class="hide">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div>
      <h1>⚖️ Libra Admin</h1>
      <div class="sub">Panel de monitoreo y backup</div>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="outline" onclick="loadAll()">🔄 Refrescar</button>
      <button class="outline" onclick="exportUsers()">💾 Export usuarios</button>
      <button class="danger" onclick="logout()">Salir</button>
    </div>
  </div>

  <div class="card">
    <div class="sec-t">📊 Stats</div>
    <div class="stats-grid" id="statsGrid"></div>
  </div>

  <div class="card">
    <div class="sec-t">👥 Usuarios</div>
    <div class="scroll">
      <table id="usersTable">
        <thead><tr>
          <th>Usuario</th><th>Creado</th><th>Ultimo login</th><th>Logins</th>
          <th>Fallos</th><th>Bloqueado</th><th>PIN</th><th>Keys</th>
        </tr></thead>
        <tbody id="usersBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="sec-t">🐞 Reportes de errores</div>
    <div class="row">
      <input id="errFilter" placeholder="Filtrar por usuario o texto..." />
      <button onclick="loadErrors()">Filtrar</button>
      <button class="outline" onclick="refreshErrors()">🔄 Refrescar</button>
      <button class="danger" onclick="clearErrors()">Borrar todos</button>
    </div>
    <div class="scroll">
      <table id="errTable">
        <thead><tr><th>Fecha</th><th>Usuario</th><th>Pagina</th><th>Descripcion</th><th>URL</th><th>Logs</th><th></th></tr></thead>
        <tbody id="errBody"></tbody>
      </table>
    </div>
  </div>

  <div class="card">
    <div class="sec-t">📋 Audit Log</div>
    <div class="row">
      <select id="filterAction">
        <option value="">Todas las acciones</option>
      </select>
      <button onclick="loadAudit()">Filtrar</button>
    </div>
    <div class="scroll">
      <table id="auditTable">
        <thead><tr><th>Fecha</th><th>Accion</th><th>Usuario</th><th>Detalle</th><th>Estado</th><th>IP</th></tr></thead>
        <tbody id="auditBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
let ADMIN_PW = sessionStorage.getItem('adminPw') || '';
const API = '/api/admin';

function $(id){return document.getElementById(id)}

$('loginBtn').onclick = login;
$('pw').addEventListener('keyup', e => { if (e.key === 'Enter') login(); });

async function login() {
  const pw = $('pw').value.trim();
  if (!pw) return;
  $('err').textContent = '';
  try {
    const r = await fetch(API + '/stats', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ password: pw })
    });
    const d = await r.json();
    if (!r.ok) { $('err').textContent = d.error || 'Error'; return; }
    ADMIN_PW = pw;
    sessionStorage.setItem('adminPw', pw);
    $('login').classList.add('hide');
    $('panel').classList.remove('hide');
    renderStats(d);
    renderUsers(d.users);
    loadAudit();
    loadErrors();
  } catch (e) {
    $('err').textContent = 'Error de red';
  }
}

function logout() {
  ADMIN_PW = '';
  sessionStorage.removeItem('adminPw');
  $('panel').classList.add('hide');
  $('login').classList.remove('hide');
  $('pw').value = '';
}

async function loadAll() {
  if (!ADMIN_PW) return;
  const r = await fetch(API + '/stats', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ password: ADMIN_PW })
  });
  if (!r.ok) { logout(); return; }
  const d = await r.json();
  renderStats(d);
  renderUsers(d.users);
  loadAudit();
  loadErrors();
}

// ===== ERROR REPORTS =====
let ERRORS_CACHE = [];
async function loadErrors() {
  if (!ADMIN_PW) return;
  try {
    const r = await fetch('/api/errors?password=' + encodeURIComponent(ADMIN_PW) + '&limit=300');
    if (!r.ok) return;
    const d = await r.json();
    ERRORS_CACHE = d.reports || [];
    renderErrors();
  } catch (e) {}
}
function refreshErrors() { loadErrors(); }
function renderErrors() {
  const filter = ($('errFilter').value || '').toLowerCase().trim();
  let list = ERRORS_CACHE.slice();
  if (filter) list = list.filter(r =>
    ((r.username || '') + ' ' + (r.description || '') + ' ' + (r.url || '') + ' ' + (r.page || ''))
      .toLowerCase().includes(filter));
  const fmt = x => x ? new Date(x).toLocaleString('es') : '—';
  $('errBody').innerHTML = list.map(r => `
    <tr data-id="${r.id}">
      <td>${fmt(r.createdAt)}</td>
      <td>${r.username ? '<b>' + r.username + '</b>' : '<span class="tag warn">anon</span>'}</td>
      <td>${r.page || '—'}</td>
      <td style="max-width:240px;white-space:normal">${(r.description || '').slice(0,160) || '<i style="color:var(--t3)">(sin desc)</i>'}</td>
      <td style="font-size:10px;color:var(--t3);max-width:140px;word-break:break-all">${r.url || '—'}</td>
      <td><span class="tag">${(r.logs || []).length}</span></td>
      <td>
        <button class="outline" style="padding:4px 8px;font-size:11px" onclick="viewErr('${r.id}')">Ver</button>
        <button class="danger" style="padding:4px 8px;font-size:11px" onclick="deleteErr('${r.id}')">✕</button>
      </td>
    </tr>
  `).join('') || '<tr><td colspan="7" style="text-align:center;color:var(--t3);padding:20px">No hay reportes</td></tr>';
}
function viewErr(id) {
  const r = ERRORS_CACHE.find(x => x.id === id);
  if (!r) return;
  const fmtT = t => new Date(t).toLocaleTimeString('es') + '.' + (t % 1000);
  const logs = (r.logs || []).map(l =>
    `<div style="font-size:11px;padding:2px 6px;border-left:3px solid ${l.level==='error'||l.level==='uncaught'||l.level==='rejection'?'var(--red)':l.level==='warn'?'var(--yellow)':'var(--blue)'};margin:2px 0"><b>[${l.level}]</b> <span style="color:var(--t3)">${fmtT(l.t)}</span>: ${escapeHtml(l.msg)}</div>`
  ).join('') || '<i style="color:var(--t3)">Sin logs</i>';
  const meta = `
    <div style="display:grid;grid-template-columns:auto 1fr;gap:4px 12px;font-size:12px;margin-bottom:10px">
      <div style="color:var(--t2)">Fecha:</div><div>${new Date(r.createdAt).toLocaleString('es')}</div>
      <div style="color:var(--t2)">Usuario:</div><div>${r.username || 'anon'} (${r.userId || '—'})</div>
      <div style="color:var(--t2)">URL:</div><div style="word-break:break-all">${r.url || '—'}</div>
      <div style="color:var(--t2)">Pagina:</div><div>${r.page || '—'}</div>
      <div style="color:var(--t2)">User Agent:</div><div style="word-break:break-all">${r.userAgent || '—'}</div>
      <div style="color:var(--t2)">Plataforma:</div><div>${r.platform || '—'} / ${r.language || '—'}</div>
      <div style="color:var(--t2)">Pantalla:</div><div>${r.screen || '—'} / viewport ${r.viewport || '—'}</div>
      <div style="color:var(--t2)">Online:</div><div>${r.online ? 'si' : 'no'}</div>
      <div style="color:var(--t2)">IP:</div><div>${r.ip || '—'}</div>
    </div>
    <div style="margin:10px 0;padding:10px;background:var(--card2);border-radius:8px">
      <div style="color:var(--t2);font-size:11px;margin-bottom:4px">Descripcion:</div>
      <div style="white-space:pre-wrap">${escapeHtml(r.description || '(sin descripcion)')}</div>
    </div>
    <div style="color:var(--t2);font-size:11px;margin-bottom:4px">Logs (${(r.logs || []).length}):</div>
    <div style="max-height:300px;overflow-y:auto;background:#000;padding:6px;border-radius:6px">${logs}</div>
  `;
  showErrModal(meta);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}
function showErrModal(html) {
  let m = document.getElementById('errModal');
  if (!m) {
    m = document.createElement('div');
    m.id = 'errModal';
    m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;overflow-y:auto';
    m.innerHTML = '<div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;max-width:800px;width:100%;max-height:90vh;overflow-y:auto"><div id="errModalBody"></div><button style="margin-top:10px;width:100%" onclick="document.getElementById(\'errModal\').remove()">Cerrar</button></div>';
    document.body.appendChild(m);
  }
  m.querySelector('#errModalBody').innerHTML = html;
}
async function deleteErr(id) {
  if (!confirm('Borrar este reporte?')) return;
  await fetch('/api/errors/' + id + '?password=' + encodeURIComponent(ADMIN_PW), { method: 'DELETE' });
  loadErrors();
}
async function clearErrors() {
  if (!confirm('Borrar TODOS los reportes?')) return;
  await fetch('/api/errors?password=' + encodeURIComponent(ADMIN_PW), { method: 'DELETE' });
  loadErrors();
}

function fmtUptime(s) {
  const d = Math.floor(s/86400), h = Math.floor(s%86400/3600), m = Math.floor(s%3600/60);
  if (d) return `${d}d ${h}h`;
  if (h) return `${h}h ${m}m`;
  return `${m}m`;
}

function fmtSize(b) {
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b/1024).toFixed(1) + ' KB';
  return (b/1048576).toFixed(2) + ' MB';
}

function renderStats(d) {
  const s = d.stats;
  const totalLogins = d.users.reduce((a,u)=>a+(u.loginCount||0),0);
  const locked = d.users.filter(u=>u.locked).length;
  $('statsGrid').innerHTML = `
    <div class="stat"><div class="stat-v">${s.totalUsers}</div><div class="stat-l">Usuarios</div></div>
    <div class="stat"><div class="stat-v">${totalLogins}</div><div class="stat-l">Logins totales</div></div>
    <div class="stat"><div class="stat-v">${locked}</div><div class="stat-l">Bloqueados</div></div>
    <div class="stat"><div class="stat-v">${s.totalAuditEvents}</div><div class="stat-l">Audit events</div></div>
    <div class="stat"><div class="stat-v">${fmtUptime(s.serverUptimeSec)}</div><div class="stat-l">Uptime</div></div>
    <div class="stat"><div class="stat-v">${fmtSize(s.totalDataSize)}</div><div class="stat-l">Data size</div></div>
  `;
}

function renderUsers(users) {
  const fmt = x => x ? new Date(x).toLocaleString('es') : '—';
  $('usersBody').innerHTML = users.map(u => `
    <tr>
      <td><b>${u.username}</b></td>
      <td>${fmt(u.createdAt)}</td>
      <td>${fmt(u.lastLogin)}</td>
      <td>${u.loginCount}</td>
      <td>${u.failedAttempts ? `<span class="tag warn">${u.failedAttempts}</span>` : '0'}</td>
      <td>${u.locked ? '<span class="tag bad">SI</span>' : '<span class="tag ok">No</span>'}</td>
      <td>${u.hasRecoveryPin ? '✓' : '—'}</td>
      <td>${u.dataKeysCount}</td>
    </tr>
  `).join('');
}

async function loadAudit() {
  if (!ADMIN_PW) return;
  const action = $('filterAction').value;
  const url = API + '/audit?password=' + encodeURIComponent(ADMIN_PW) + (action ? '&action=' + encodeURIComponent(action) : '') + '&limit=200';
  const r = await fetch(url);
  if (!r.ok) return;
  const d = await r.json();
  renderAudit(d.logs);
}

function renderAudit(logs) {
  // Populate filter dropdown
  const sel = $('filterAction');
  const current = sel.value;
  const actions = [...new Set(logs.map(l => l.action))].sort();
  if (sel.options.length < actions.length + 1) {
    sel.innerHTML = '<option value="">Todas las acciones</option>' +
      actions.map(a => `<option value="${a}" ${a === current ? 'selected' : ''}>${a}</option>`).join('');
  }

  const fmt = x => x ? new Date(x).toLocaleString('es') : '—';
  const statusTag = s => {
    if (s === 'completed') return '<span class="tag ok">ok</span>';
    if (s === 'failed') return '<span class="tag bad">fail</span>';
    if (s === 'blocked') return '<span class="tag bad">block</span>';
    return s ? `<span class="tag warn">${s}</span>` : '';
  };
  $('auditBody').innerHTML = logs.map(l => `
    <tr>
      <td>${fmt(l.timestamp)}</td>
      <td><b>${l.action}</b></td>
      <td>${l.userId ? l.userId.slice(0,8) : '—'}</td>
      <td>${(l.detail || '').slice(0,80)}</td>
      <td>${statusTag(l.status)}</td>
      <td>${l.ip || '—'}</td>
    </tr>
  `).join('');
}

async function exportUsers() {
  if (!ADMIN_PW) return;
  const r = await fetch(API + '/export-users', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ password: ADMIN_PW })
  });
  if (!r.ok) { alert('Error exportando'); return; }
  const d = await r.json();
  const blob = new Blob([JSON.stringify(d, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `libra-users-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

// Auto-login if we have a cached password
if (ADMIN_PW) {
  $('pw').value = ADMIN_PW;
  login();
}
</script>
</body>
</html>
